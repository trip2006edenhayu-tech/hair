<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エクステ診断</title>

<style>
body{
font-family:sans-serif;
background:#f8f5ef;
max-width:900px;
margin:auto;
padding:20px;
line-height:1.8;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1,h2,h3{
text-align:center;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
background:#c9a227;
color:#fff;
font-size:16px;
cursor:pointer;
}

.btn{
display:block;
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
background:#c9a227;
color:white;
text-decoration:none;
text-align:center;
box-sizing:border-box;
}

.red{
color:red;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin:15px 0;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.banner{
background:#fff0f0;
border:3px solid red;
color:red;
font-size:28px;
font-weight:bold;
padding:15px;
border-radius:15px;
text-align:center;
}
</style>
</head>

<body>

<div class="card" id="app"></div>

<script>
  function nav(back){
return `
<button onclick="${back}">⬅ 戻る</button>
<button onclick="home()">🏠 最初から診断する</button>
`;
}

let hair="";
let resultType="";

function home(){
document.getElementById("app").innerHTML=`
<h1>✨あなたに合うエクステ診断✨</h1>
<p style="text-align:center;">診断時間 約30秒</p>

<button onclick="wingStep2()">1年を通して長く楽しみたい</button>

<button onclick="sealStep2()">イベントやイメチェンで楽しみたい</button>
`;
}

function wingStep2(){
document.getElementById("app").innerHTML=`
<h2>STEP2</h2>
<h3>エクステで重視することは？</h3>

<button onclick="hairStep('wing')">お手入れの楽さ</button>

<button onclick="hairStep('wing')">毛質の良さ</button>

<button onclick="hairStep('wing')">長持ちすること</button>

${nav('home()')}
`;
}

function sealStep2(){
document.getElementById("app").innerHTML=`
<h2>STEP2</h2>
<h3>普段アイロンやコテを使いますか？</h3>

<button onclick="sealStep3()">毎日使う</button>

<button onclick="sealStep3()">たまに使う</button>

<button onclick="sealStep3()">ほとんど使わない</button>

${nav('home()')}
`;
}

function sealStep3(){
document.getElementById("app").innerHTML=`
<h2>STEP3</h2>
<h3>エクステに求めるものは？</h3>

<button onclick="hairStep('royal')">価格重視</button>

<button onclick="hairStep('premium')">価格と毛質のバランス重視</button>

<button onclick="hairStep('virgin')">毛質重視</button>

${nav('sealStep2()')}
`;
}

function hairStep(type){

resultType=type;

document.getElementById("app").innerHTML=`
<h2>STEP4</h2>

<h3>現在の髪の長さは？</h3>

<button onclick="saveHair('ボブ')">ボブ</button>

<button onclick="saveHair('ミディアム')">ミディアム</button>

<button onclick="saveHair('セミロング')">セミロング</button>

${nav(resultType==='wing' ? 'wingStep2()' : 'sealStep3()')}
`;
}

function saveHair(v){

hair=v;

if(resultType==="wing"){
wingResult();
}
else if(resultType==="royal"){
royalResult();
}
else if(resultType==="premium"){
premiumResult();
}
else{
virginResult();
}

}

function wingRecommend(){

if(hair==="ボブ"){
return "80〜100束";
}

if(hair==="ミディアム"){
return "60〜80束";
}

return "40〜60束";

}

function sealRecommend(){

if(hair==="ボブ"){
return "80〜100本";
}

if(hair==="ミディアム"){
return "60〜80本";
}

return "40〜60本";

}

document.getElementById("app").innerHTML=`

</div>

<h2>🏆当店人気No.1</h2>
