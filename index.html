<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>エクステ診断 Ver.2</title>
<style>
body{font-family:sans-serif;max-width:900px;margin:auto;padding:20px;background:#fafafa;line-height:1.8}
.card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 0 10px rgba(0,0,0,.1)}
button{width:100%;padding:14px;margin:8px 0;border:none;border-radius:10px;cursor:pointer}
.reserve{display:inline-block;background:#d4af37;color:#fff;text-decoration:none;padding:12px 18px;border-radius:10px;margin:5px}
.red{color:red;font-weight:bold} table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px;text-align:center}
.banner{background:#fff0f0;border:3px solid red;color:red;font-size:28px;font-weight:bold;text-align:center;padding:15px;border-radius:15px}
</style></head><body>
<div class="card" id="app"></div>
<script>
function reserve(){return `<h3>📅ご予約はこちら</h3>
<a class="reserve" target="_blank" href="https://beauty.hotpepper.jp/slnH000357549/coupon/">天神店</a>
<a class="reserve" target="_blank" href="https://beauty.hotpepper.jp/slnH000381028/coupon/">博多店</a>`;}
function restart(){home();}
function home(){
document.getElementById('app').innerHTML=`<h1>✨あなたに合うエクステ診断✨</h1>
<h3>Q1. エクステをどのように楽しみたいですか？</h3>
<button onclick="wing()">1年を通して長く楽しみたい</button>
<button onclick="seal()">イベントやイメチェンで一度楽しみたい</button>`;}
function nav(back){return `<button onclick="${back}">← 戻る</button><button onclick="restart()">🔄 最初から診断する</button>`;}
function seal(){document.getElementById('app').innerHTML=`<h3>Q2.シールエクステ選びで重視するものは？</h3>
<button onclick="royal()">価格重視</button><button onclick="premium()">価格と毛質のバランス重視</button><button onclick="virgin()">毛質重視</button>${nav('home()')}`;}
function wing(){document.getElementById('app').innerHTML=`<div class="banner">🎉 最大17万3千円お得！</div><h2>💎ダブル羽エクステ</h2>
<p>無加工毛・リペア可能・カラー可能・お手入れ簡単</p>
<table><tr><th>束数</th><th>年間お得額</th></tr>
<tr><td>60束</td><td class="red">10万3,800円お得！</td></tr>
<tr><td>80束</td><td class="red">13万8,400円お得！</td></tr>
<tr><td>100束</td><td class="red">17万3千円お得！</td></tr></table>
${reserve()}${nav('home()')}`;}
function royal(){document.getElementById('app').innerHTML=`<h2>ロイヤルレミー</h2><p>1本¥270 平均予算¥22,000</p>
<table><tr><th>本数</th><th>料金</th></tr><tr><td>60</td><td>¥16,200</td></tr><tr><td>80</td><td>¥21,600</td></tr><tr><td>100</td><td>¥27,000</td></tr></table>
${reserve()}${nav('seal()')}`;}
function premium(){document.getElementById('app').innerHTML=`<h2>プレミアムレミー</h2><p>1本¥370 平均予算¥30,000</p>
<table><tr><th>本数</th><th>料金</th></tr><tr><td>60</td><td>¥22,200</td></tr><tr><td>80</td><td>¥29,600</td></tr><tr><td>100</td><td>¥37,000</td></tr></table>
${reserve()}${nav('seal()')}`;}
function virgin(){document.getElementById('app').innerHTML=`<h2>バージンレミー</h2><p>1本¥460 平均予算¥36,800</p>
<table><tr><th>本数</th><th>料金</th></tr><tr><td>60</td><td>¥27,600</td></tr><tr><td>80</td><td>¥36,800</td></tr><tr><td>100</td><td>¥46,000</td></tr></table>
${reserve()}${nav('seal()')}`;}
home();
</script></body></html>
